<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שפע יואל - השוואת גרסאות</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'David', 'Narkisim', serif; background: #f5f0e8; color: #2c1810; }

        .header { background: #4a2c1a; color: #f5f0e8; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; }
        .header .stats { font-size: 14px; opacity: 0.8; }

        .controls { background: #fff; padding: 12px 24px; border-bottom: 2px solid #d4c5a9; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .controls select, .controls input, .controls button {
            padding: 8px 12px; border: 1px solid #d4c5a9; border-radius: 6px; font-size: 14px; font-family: inherit;
        }
        .controls button { background: #4a2c1a; color: white; cursor: pointer; border: none; }
        .controls button:hover { background: #6b3d24; }
        .controls button.generate { background: #2a6b3d; }
        .controls button.generate:hover { background: #3a8b4d; }

        .main { display: flex; height: calc(100vh - 120px); }

        .lesson-list { width: 280px; background: #fff; border-left: 2px solid #d4c5a9; overflow-y: auto; }
        .lesson-item { padding: 10px 14px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .lesson-item:hover { background: #f5f0e8; }
        .lesson-item.active { background: #e8dcc8; border-right: 3px solid #4a2c1a; }
        .lesson-item .id { font-weight: bold; color: #4a2c1a; }
        .lesson-item .title { display: block; margin-top: 4px; color: #555; font-size: 12px; }
        .lesson-item .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-top: 4px; }
        .badge.has-versions { background: #d4edda; color: #155724; }
        .badge.empty { background: #f8d7da; color: #721c24; }
        .badge.finalized { background: #cce5ff; color: #004085; }

        .content { flex: 1; overflow-y: auto; padding: 24px; }

        .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .panel { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel h3 { font-size: 16px; color: #4a2c1a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #d4c5a9; }
        .panel .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .panel .title-text { font-weight: bold; font-size: 15px; margin-bottom: 12px; }
        .panel .body-text { font-size: 14px; line-height: 1.8; }
        .panel.human { border-top: 3px solid #2a6b3d; }
        .panel.ai { border-top: 3px solid #4a2c1a; }
        .panel.ai.negative { border-top: 3px solid #c0392b; }
        .panel.ai.positive { border-top: 3px solid #27ae60; }

        .sources-panel { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .sources-panel h3 { font-size: 16px; color: #4a2c1a; margin-bottom: 12px; }
        .source-item { background: #f9f6f0; border-radius: 6px; padding: 12px; margin-bottom: 10px; border-right: 3px solid #d4c5a9; }
        .source-item.supporting { border-right-color: #95a5a6; }
        .source-item .sefer { font-weight: bold; color: #4a2c1a; font-size: 13px; }
        .source-item .raw { font-size: 13px; line-height: 1.6; margin-top: 6px; }

        .scores { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .score { text-align: center; }
        .score .value { font-size: 20px; font-weight: bold; }
        .score .name { font-size: 10px; color: #888; }

        .eval-notes { margin-top: 12px; font-size: 13px; color: #555; background: #f9f6f0; padding: 10px; border-radius: 6px; }

        .version-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .version-tab { padding: 6px 12px; background: #eee; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 12px; }
        .version-tab.active { background: #4a2c1a; color: white; }
        .version-tab.positive { background: #d4edda; }
        .version-tab.negative { background: #f8d7da; }

        .empty-state { text-align: center; padding: 60px; color: #888; }
        .empty-state h2 { margin-bottom: 12px; }

        #loading { display: none; text-align: center; padding: 20px; color: #888; }

        /* ── Generate Panel ── */
        .gen-panel { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; border-top: 3px solid #2a6b3d; }
        .gen-panel h3 { font-size: 16px; color: #2a6b3d; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #d4c5a9; }
        .gen-panel .gen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .gen-panel .neighbor-box { background: #f9f6f0; border-radius: 6px; padding: 12px; border-right: 3px solid #d4c5a9; }
        .gen-panel .neighbor-box .nb-title { font-weight: bold; color: #4a2c1a; font-size: 13px; }
        .gen-panel .neighbor-box .nb-body { font-size: 13px; color: #555; margin-top: 4px; line-height: 1.6; }
        .gen-panel textarea { width: 100%; min-height: 120px; padding: 12px; border: 1px solid #d4c5a9; border-radius: 6px; font-family: inherit; font-size: 14px; line-height: 1.8; resize: vertical; direction: rtl; }
        .gen-panel textarea:focus { outline: none; border-color: #2a6b3d; }
        .gen-panel .toolbar { display: flex; gap: 10px; justify-content: center; margin: 14px 0; }
        .gen-panel .toolbar button { padding: 10px 24px; font-size: 15px; }
        .gen-panel .result-box { background: #f0f8f0; border: 2px solid #2a6b3d; border-radius: 8px; padding: 20px; margin-top: 16px; }
        .gen-panel .result-title { font-size: 20px; font-weight: bold; color: #2a6b3d; margin-bottom: 8px; }
        .gen-panel .result-body { font-size: 16px; line-height: 2; }
        .gen-panel .gen-stats { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .gen-panel .gen-stat { background: #e8dcc8; padding: 3px 10px; border-radius: 6px; font-size: 12px; color: #555; }
        .gen-panel .gen-stat b { color: #4a2c1a; }
        .gen-panel .api-key-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
        .gen-panel .api-key-row input { flex: 1; padding: 8px 12px; border: 1px solid #d4c5a9; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .gen-panel .api-key-row label { font-size: 13px; color: #888; white-space: nowrap; }
        .gen-panel .context-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-left: 8px; }
        .gen-panel .ctx-opener { background: #d4edda; color: #155724; }
        .gen-panel .ctx-middle { background: #cce5ff; color: #004085; }
        .gen-panel .ctx-closer { background: #e2d5f0; color: #5a3d7a; }
        .gen-hidden { display: none; }
        .gen-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #d4c5a9; border-top-color: #2a6b3d; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

        // ── Generate Functions ──

        async function mcpCall(method, args = {}) {
            const r = await fetch(API + '/mcp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', id: Date.now(), method: 'tools/call', params: { name: method, arguments: args } })
            });
            const d = await r.json();
            if (d.result?.content?.[0]?.text) return JSON.parse(d.result.content[0].text);
            if (d.result?.isError) throw new Error(d.result.content?.[0]?.text || 'MCP error');
            return d.result;
        }

            try {

        function buildGenPrompt(data, meth) {
            const ctx = data.context || {};
            const lesson = data.current_lesson || data.lesson || {};
            let src = '';
            const sources = lesson.sources || data.sources || [];
            for (const s of sources) {
                src += '\n- [' + s.source_type + '] ' + s.sefer + ' (' + s.location + '): ' + s.raw_text;
            }
            const before = ctx.lesson_before ? 'כותרת: ' + ctx.lesson_before.title + '\nגוף: ' + ctx.lesson_before.body : '(אין — שיעור ראשון)';
            const after = ctx.lesson_after ? 'כותרת: ' + ctx.lesson_after.title + '\nגוף: ' + ctx.lesson_after.body : '(אין — שיעור אחרון)';

            document.getElementById('genPrompt').value = meth + '\n\n═══════════════════════════════\nMISSION: Write lesson ' + lesson.id + '\n═══════════════════════════════\n\n' +
                'Chapter: ' + ctx.chapter + ' — ' + ctx.chapter_desc + '\nSection: ' + ctx.section_heading + '\nPosition: ' + ctx.position + ' (' + ctx.position_index + '/' + ctx.total_in_section + ')\n\n' +
                '── SOURCES ──' + src + '\n\n── LESSON BEFORE ──\n' + before + '\n\n── LESSON AFTER ──\n' + after + '\n\n' +
                '── CURRENT LESSON ──\nID: ' + (lesson.id || '') + '\nChapter: ' + (lesson.chapter || ctx.chapter || '') + '\nSection: ' + (lesson.section_heading || ctx.section_heading || '') + '\n\n' +
                '── INSTRUCTIONS ──\nGenerate a new title and body following SKILL-v2 methodology exactly.\nTitle: 5-9 Hebrew words ending with ":"\nBody: One flowing sentence, ~46 words, elevated Lashon Hakodesh.\n' +
                (ctx.position !== 'opener' ? 'Start body with a connector (וכן, ולפיכך, ועוד ש, גם, אף, יתר על כן, ומכאן ש).\n' : '') +
                '\nOutput format:\nכותרת: <title>\nגוף: <body>';
        }

            const prompt = document.getElementById('genPrompt').value;

            document.getElementById('genResult').classList.add('gen-hidden');

            try {
                const r = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1024,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });
                const d = await r.json();
                if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
                const text = d.content?.[0]?.text || '';

                const tm = text.match(/כותרת:\s*(.+)/);
                const bm = text.match(/גוף:\s*(.+)/);
                const title = tm ? tm[1].trim() : text.split('\n')[0];
                const body = bm ? bm[1].trim() : text;

                const tw = title.replace(/:$/, '').trim().split(/\s+/).length;
                const bw = body.trim().split(/\s+/).length;
                const periods = (body.match(/\./g) || []).length;

                document.getElementById('genResult').innerHTML = `
                    <div class="result-box">
                        <div class="result-title">${esc(title)}</div>
                        <div class="result-body">${esc(body)}</div>
                        <div class="gen-stats">
                            <span class="gen-stat">מילות כותרת: <b>${tw}</b> (5-9)</span>
                            <span class="gen-stat">מילות גוף: <b>${bw}</b> (~46)</span>
                            <span class="gen-stat">נקודות: <b>${periods}</b> (0-1)</span>
                            <span class="gen-stat">נקודתיים: <b>${title.endsWith(':') ? '✓' : '✗'}</b></span>
                        </div>
                    </div>
                    <div style="margin-top:14px">
                        <div style="font-size:13px;color:#888;margin-bottom:4px">הערות (אופציונלי)</div>
                        <textarea id="genEvalNotes" rows="3" style="width:100%;padding:10px;border:1px solid #d4c5a9;border-radius:6px;font-family:inherit;font-size:14px;direction:rtl;resize:vertical" placeholder="הערות על הגרסה..."></textarea>
                    </div>
                    <div class="toolbar">
                        <button class="generate" onclick="saveGenVersion()" style="background:#2a6b3d;padding:10px 24px;font-size:15px">שמור גרסה</button>
                        <button class="generate" onclick="runGenerate()" style="padding:10px 24px;font-size:15px">חולל מחדש</button>
                    </div>`;
                document.getElementById('genResult').classList.remove('gen-hidden');
                document.getElementById('genStatus').textContent = '';
                genData._generated = { title, body };
            } catch(e) {
                document.getElementById('genStatus').textContent = 'שגיאה: ' + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        async function saveGenVersion() {
            if (!genData?._generated) return;
            const { title, body } = genData._generated;
            const lessonId = (genData.current_lesson || genData.lesson || {}).id || currentLesson.id;
            document.getElementById('genStatus').innerHTML = 'שומר...<span class="gen-spinner"></span>';
            try {
                const evalNotes = document.getElementById('genEvalNotes')?.value || '';
                const saveArgs = { lesson_id: lessonId, generated_title: title, generated_body: body };
                if (evalNotes) saveArgs.evaluation_notes = evalNotes;
                await mcpCall('save_version', saveArgs);
                document.getElementById('genStatus').textContent = 'נשמר בהצלחה!';
                setTimeout(() => {
                    document.getElementById('genStatus').textContent = '';
                    // Refresh the lesson to show new version
                    selectLesson(currentLesson.id);
                }, 1500);
            } catch(e) {
                document.getElementById('genStatus').textContent = 'שגיאה: ' + e.message;
            }
        }

        function showVersion(versionId) {
            const v = currentVersions.find(ver => ver.id === versionId);
            if (!v) return;
            const panel = document.querySelector('.panel.ai');
            if (panel) {
                panel.outerHTML = renderVersion(v, currentVersions);
            }
        }

        async function loadSkillExamples() {
            const examples = await query('skill_examples', 'order=id.asc');
            const content = document.getElementById('content');

            let html = '<h2 style="margin-bottom:20px;color:#4a2c1a">דוגמאות מיומנות (${examples.length})</h2>';

            examples.forEach((ex, i) => {
                html += `<div style="margin-bottom:30px">
                    <h3 style="color:#4a2c1a;margin-bottom:8px">${i+1}. ${ex.category} — ${ex.rule_reference || ''}</h3>
                    ${ex.source_text ? `<div class="sources-panel"><h3>מקור</h3><div class="source-item"><div class="raw">${ex.source_text.substring(0, 300)}${ex.source_text.length > 300 ? '...' : ''}</div></div></div>` : ''}
                    <div class="comparison">
                        <div class="panel ai negative">
                            <h3>✗ גרסה שגויה</h3>
                            <div class="body-text">${ex.bad_version || ''}</div>
                            <div class="eval-notes">${ex.bad_reason || ''}</div>
                        </div>
                        <div class="panel ai positive">
                            <h3>✓ גרסה נכונה</h3>
                            <div class="body-text">${ex.good_version || ''}</div>
                            <div class="eval-notes">${ex.good_reason || ''}</div>
                        </div>
                    </div>
                    ${ex.conversation_context ? `<div class="eval-notes" style="margin-bottom:10px"><strong>יואל:</strong> ${ex.conversation_context}</div>` : ''}
                </div>`;
            });

            content.innerHTML = html;
        }

        function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // Event listeners
        document.getElementById('chapterFilter').addEventListener('change', renderList);
        document.getElementById('statusFilter').addEventListener('change', renderList);
        document.getElementById('search').addEventListener('input', renderList);

        init();
    </script>
</body>
</html>
